name: grid-core tests

on:
  push:
    branches:
      - main
    paths:
      - 'grid_api/**'
      - 'alembic/**'
      - 'requirements*.txt'
      - '.github/workflows/maintests.yml'
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --upgrade pip wheel setuptools
      - name: Install deps
        run: pip install -r requirements.txt pytest pytest-asyncio
      - name: Offline test suite (grid_api)
        # Unit tests for the on-the-money path (den, settlement merkle/ipfs,
        # recipes, payout-wallet validation). No Postgres/Redis/live API needed;
        # live integration tests live under tests/ and run separately.
        run: python -m pytest grid_api -q
