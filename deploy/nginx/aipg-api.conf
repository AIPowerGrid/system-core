# nginx site for api.aipowergrid.io
# /v1/* + /metrics  -> grid_api (uvicorn, port 7010), incl. WebSocket + SSE
# everything else   -> Flask pool (7001-7008)
#
# Install: cp to /etc/nginx/sites-available/aipg-api.conf, symlink to
# sites-enabled, then `certbot --nginx -d api.aipowergrid.io` for TLS.

upstream aipg_flask {
    least_conn;
    server 127.0.0.1:7001;
    server 127.0.0.1:7002;
    server 127.0.0.1:7003;
    server 127.0.0.1:7004;
    server 127.0.0.1:7005;
    server 127.0.0.1:7006;
    server 127.0.0.1:7007;
    server 127.0.0.1:7008;
}

upstream aipg_gridapi {
    server 127.0.0.1:7010;
}

server {
    listen 80;
    server_name api.aipowergrid.io;
    # certbot will add the 443 server + redirect

    client_max_body_size 64m;   # base64 source images for img2img

    # Streaming API: SSE needs buffering off; worker WS needs upgrade headers.
    location /v1/ {
        proxy_pass http://aipg_gridapi;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;          # SSE token streaming
        proxy_read_timeout 600s;      # long generations + idle worker sockets
        proxy_send_timeout 600s;
    }

    location /metrics {
        # Prometheus scrape — restrict to your monitoring host(s).
        allow 127.0.0.1;
        deny all;
        proxy_pass http://aipg_gridapi;
    }

    # Everything else (register, /api/v2/*, swagger) -> Flask pool.
    location / {
        proxy_pass http://aipg_flask;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
