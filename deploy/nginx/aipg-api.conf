# nginx site for api.aipowergrid.io
#
# Public URL scheme (no doubled "api" — the subdomain already says it):
#   /v1/*       -> grid_api  (uvicorn :7010)  chat/agents, OpenAI+Anthropic, WS, SSE
#   /v2/*       -> Flask pool (:7001-8)        legacy horde queue (image/video poll)
#   /api/v2/*   -> Flask pool (:7001-8)        back-compat alias for old horde tooling
#   /metrics    -> grid_api  (Prometheus, localhost only)
#   everything else (register, swagger) -> Flask pool
#
# The Flask app mounts its routes under /api/v2 internally, so /v2/* is rewritten
# to /api/v2/* before proxying. grid_api reaches Flask directly over localhost
# (FLASK_API_BASE), not through here, so this rewrite is purely the public face.
#
# Install: cp to /etc/nginx/sites-available/aipg-api.conf, symlink to
# sites-enabled, then `certbot --nginx -d api.aipowergrid.io` for TLS.

upstream aipg_flask {
    least_conn;
    server 127.0.0.1:7001;
    server 127.0.0.1:7002;
    server 127.0.0.1:7003;
    server 127.0.0.1:7004;
    server 127.0.0.1:7005;
    server 127.0.0.1:7006;
    server 127.0.0.1:7007;
    server 127.0.0.1:7008;
}

upstream aipg_gridapi {
    server 127.0.0.1:7010;
}

server {
    listen 80;
    server_name api.aipowergrid.io;
    # certbot will add the 443 server + redirect

    client_max_body_size 64m;   # base64 source images for img2img

    # ── New API: chat / agents / streaming ──────────────────────────────
    # SSE needs buffering off; worker WS needs upgrade headers.
    location /v1/ {
        proxy_pass http://aipg_gridapi;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;          # SSE token streaming
        proxy_read_timeout 600s;      # long generations + idle worker sockets
        proxy_send_timeout 600s;
    }

    # ── Legacy horde queue: clean /v2 public path ───────────────────────
    # Rewrite the clean public path to the /api/v2 the Flask app mounts at.
    location /v2/ {
        rewrite ^/v2/(.*)$ /api/v2/$1 break;
        proxy_pass http://aipg_flask;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Back-compat alias: old clients that hardcoded /api/v2 still work ──
    location /api/v2/ {
        proxy_pass http://aipg_flask;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /metrics {
        # Prometheus scrape — restrict to your monitoring host(s).
        allow 127.0.0.1;
        deny all;
        proxy_pass http://aipg_gridapi;
    }

    # Everything else (register, swagger, root) -> Flask pool.
    location / {
        proxy_pass http://aipg_flask;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
